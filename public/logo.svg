<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="cork" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#FF8066"/>
      <stop offset="100%" stop-color="#E8553A"/>
    </radialGradient>
  </defs>

  <g transform="translate(100,108) rotate(-25)">
    <!-- Feathers — bold teal so they pop on any bg -->
    <ellipse cx="-20" cy="-58" rx="16" ry="42" transform="rotate(-15)" fill="#00BFA5" opacity="0.7"/>
    <ellipse cx="20" cy="-58" rx="16" ry="42" transform="rotate(15)" fill="#00BFA5" opacity="0.7"/>
    <ellipse cx="-10" cy="-62" rx="14" ry="45" transform="rotate(-7)" fill="#00D4AA" opacity="0.85"/>
    <ellipse cx="10" cy="-62" rx="14" ry="45" transform="rotate(7)" fill="#00D4AA" opacity="0.85"/>
    <ellipse cx="0" cy="-64" rx="12" ry="48" fill="#2EECC6"/>

    <!-- Cork body -->
    <rect x="-32" y="-16" width="64" height="58" rx="20" fill="url(#cork)"/>

    <!-- Eyes -->
    <circle cx="-10" cy="12" r="6.5" fill="#1A1A1A"/>
    <circle cx="-7.5" cy="9" r="2.2" fill="white"/>
    <circle cx="14" cy="12" r="6.5" fill="#1A1A1A"/>
    <circle cx="16.5" cy="9" r="2.2" fill="white"/>

    <!-- Smile -->
    <path d="M-4 24 Q2 32 10 24" stroke="#1A1A1A" stroke-width="2.8" stroke-linecap="round" fill="none"/>

    <!-- Blush -->
    <ellipse cx="-20" cy="22" rx="7" ry="4.5" fill="#FFB800" opacity="0.4"/>
    <ellipse cx="24" cy="22" rx="7" ry="4.5" fill="#FFB800" opacity="0.4"/>
  </g>
</svg>
